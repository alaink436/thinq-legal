<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thinq — Support</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Mono', 'SF Mono', monospace;
      background: #1C1C1E;
      color: #F5F5F7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px;
    }
    .container { max-width: 600px; width: 100%; }
    .logo { font-size: 48px; font-weight: 900; color: #006666; letter-spacing: -2px; margin-bottom: 8px; }
    .tagline { color: #98989D; font-size: 16px; margin-bottom: 48px; }
    .links { display: flex; flex-direction: column; gap: 12px; }
    .links a {
      display: block;
      background: #2C2C2E;
      color: #F5F5F7;
      text-decoration: none;
      padding: 18px 20px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      border: 1px solid #3A3A3C;
      border-top-color: #4A4A4E;
      border-left-color: #4A4A4E;
      border-bottom-color: #0A0A0C;
      border-right-color: #0A0A0C;
      box-shadow: 3px 3px 8px rgba(0,0,0,0.8);
      transition: transform 0.15s;
    }
    .links a:hover { transform: scale(0.98); }
    .links a span { color: #98989D; font-size: 13px; font-weight: 400; display: block; margin-top: 4px; }
    footer { margin-top: 60px; color: #636366; font-size: 12px; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">thinq</div>
    <p class="tagline">Date smarter.</p>

    <div class="links">
      <a href="privacy.html">
        Privacy Policy
        <span>How we handle your data</span>
      </a>
      <a href="terms.html">
        Terms of Service
        <span>Rules for using Thinq</span>
      </a>
      <a href="deletion.html">
        Delete My Data
        <span>Request account & data deletion</span>
      </a>
      <a href="support.html">
        Support
        <span>Contact us for help</span>
      </a>
    </div>

    <footer>&copy; 2026 Thinq. All rights reserved.</footer>
  </div>
</body>
</html>
